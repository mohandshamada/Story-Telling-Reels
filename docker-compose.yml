version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: story
      POSTGRES_PASSWORD: story
      POSTGRES_DB: story_reels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://story:story@db:5432/story_reels
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_LOCAL_PATH=/app/storage
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-XB0fDUnXU5powFXDhCwa}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-dalle}
      - TTS_PROVIDER=${TTS_PROVIDER:-elevenlabs}
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
      - XTTS_MODEL_PATH=${XTTS_MODEL_PATH:-tts_models/multilingual/multi-dataset/xtts_v2}
      - XTTS_DEFAULT_SPEAKER_WAV=${XTTS_DEFAULT_SPEAKER_WAV}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
    volumes:
      - story_storage:/app/storage
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://story:story@db:5432/story_reels
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - STORAGE_LOCAL_PATH=/app/storage
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-XB0fDUnXU5powFXDhCwa}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-dalle}
      - TTS_PROVIDER=${TTS_PROVIDER:-elevenlabs}
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
      - XTTS_MODEL_PATH=${XTTS_MODEL_PATH:-tts_models/multilingual/multi-dataset/xtts_v2}
      - XTTS_DEFAULT_SPEAKER_WAV=${XTTS_DEFAULT_SPEAKER_WAV}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
    volumes:
      - story_storage:/app/storage
    depends_on:
      - db
      - redis
      - api
    command: celery -A app.tasks.story_tasks worker -l info -c 1

  # Optional: Local ComfyUI for GPU image generation
  # Uncomment and configure if you have a GPU available
  # comfyui:
  #   image: yanwk/comfyui-boot:cu121
  #   ports:
  #     - "8188:8188"
  #   volumes:
  #     - comfyui_models:/root/ComfyUI/models
  #     - comfyui_output:/root/ComfyUI/output
  #     - story_storage:/app/storage
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  story_storage:
  postgres_data:
  # comfyui_models:
  # comfyui_output:
